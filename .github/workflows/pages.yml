# Deploys site/ to GitHub Pages (runslab.run).
# The site is a single self-contained index.html — no build step. The repo's
# install.sh is staged into the artifact as /install so
# `curl -fsSL https://runslab.run/install | bash` serves the real thing.
name: pages
on:
  push:
    branches: [master]
    paths: ['site/**', 'install.sh', '.github/workflows/pages.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/configure-pages@v6
      - name: stage site + /install
        run: |
          mkdir -p _site
          cp -R site/. _site/
          cp install.sh _site/install
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v5
